services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: book-writer-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
  postgres:
    image: postgres:17
    container_name: book-writer-postgres
    environment:
      POSTGRES_DB: book_writer
      POSTGRES_USER: book_writer
      POSTGRES_PASSWORD: book_writer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book_writer -d book_writer"]
      interval: 10s
      timeout: 5s
      retries: 5